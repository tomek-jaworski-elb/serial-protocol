version: "3.7"
services:
    server:
        build: .
        depends_on:
          db:
            condition: service_healthy
            restart: true
        restart: unless-stopped
        container_name: serial-ports-server
        environment:
            - rs.baud_rate=9600
            - rs.message_delimiter=13,10  # 10 = \n, 13 = \r
            - ws.heartbeat.interval=2000  # value in ms > 1
#            - ws.endpoint=/echo
        ports:
            - "8081:8081"
        networks:
          backend:
            ipv4_address: 192.168.2.2
        volumes:
            - ./logs:/app/logs
        devices:
            - /dev/ttyS0:/dev/ttyS0
            - /dev/ttyS2:/dev/ttyS2
            - /dev/ttyS1:/dev/ttyS1
            - /dev/ttyACM0:/dev/ttyACM0
            - /dev:/dev
        privileged: true
    db:
      extends:
        file: ../db-access-service/docker-compose.yml
        service: db
networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.2.0/24
          gateway: 192.168.2.1
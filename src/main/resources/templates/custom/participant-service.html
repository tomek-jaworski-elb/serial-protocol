<!DOCTYPE html>
<html lang="en">
<head th:insert="~{fragment::head}"></head>
<head>
    <title th:text="${@environment.getProperty('spring.application.name')} + ' : Participant'">Serial port server</title>
</head>
<body>
<header th:replace="~{fragment::header}"></header>
<div class="container mb-4">
    <div class="d-flex justify-content-between align-items-center my-3">
        <h4 class="mb-0">Participant</h4>
        <span class="badge bg-secondary" th:text="${#lists.size(participants)}" th:if="${!#lists.isEmpty(participants)}">0</span>
    </div>

    <div class="table-responsive" th:if="${!#lists.isEmpty(participants)}">
        <table class="table table-striped table-hover align-middle text-center">
            <thead class="table-light">
            <tr>
                <th scope="col">#</th>
                <th scope="col">UUID</th>
                <th scope="col">ID</th>
                <th scope="col">Name</th>
                <th scope="col">Surname</th>
                <th scope="col">Birth Date</th>
                <th scope="col">Photo</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="participant, participantStat : ${participants}">
                <th scope="row" th:text="${participantStat.index + 1}">1</th>
                <td th:text="${participant.uuid}">uuid</td>
                <td th:text="${participant.id}">1</td>
                <td th:text="${participant.name}">John</td>
                <td th:text="${participant.surname}">Doe</td>
                <td th:text="${participant.birthDate != null ? #temporals.format(participant.birthDate, 'yyyy-MM-dd') : '-'}">2026-03-15</td>
                <td>
                    <span class="badge text-bg-success" th:if="${participant.photo != null}">Available</span>
                    <span class="badge text-bg-secondary" th:unless="${participant.photo != null}">No photo</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="alert alert-info text-center" th:if="${#lists.isEmpty(participants)}">
        No participants found.
    </div>
</div>
<footer th:replace="~{fragment::footer}"></footer>
</body>
</html>

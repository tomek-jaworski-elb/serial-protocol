<!DOCTYPE html>
<html lang="en">
<head th:insert="~{fragment::head}"></head>
<head>
    <title th:text="${@environment.getProperty('spring.application.name')} + ' : Courses'">Serial port server</title>
</head>
<body>
<header th:replace="~{fragment::header}"></header>
<div class="container mb-4">
    <div class="d-flex justify-content-between align-items-center my-3">
        <h4 class="mb-0">Courses</h4>
        <span class="badge bg-secondary" th:text="${#lists.size(courses)}" th:if="${!#lists.isEmpty(courses)}">0</span>
    </div>

    <div class="table-responsive" th:if="${!#lists.isEmpty(courses)}">
        <table class="table table-striped table-hover align-middle text-center">
            <thead class="table-light">
            <tr>
                <th scope="col">#</th>
                <th scope="col">UUID</th>
                <th scope="col">ID</th>
                <th scope="col">Participant UUID</th>
                <th scope="col">Course Type ID</th>
                <th scope="col">Start Date</th>
                <th scope="col">End Date</th>
                <th scope="col">Trainer IDs</th>
                <th scope="col">Lecturer IDs</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course, courseStat : ${courses}">
                <th scope="row" th:text="${courseStat.index + 1}">1</th>
                <td th:text="${course.uuid}">uuid</td>
                <td th:text="${course.id}">1</td>
                <td th:text="${course.participantUuid}">participantUuid</td>
                <td th:text="${course.courseTypeId}">100</td>
                <td th:text="${course.startDate != null ? #temporals.format(course.startDate, 'yyyy-MM-dd') : '-'}">2026-03-15</td>
                <td th:text="${course.endDate != null ? #temporals.format(course.endDate, 'yyyy-MM-dd') : '-'}">2026-03-22</td>
                <td th:text="${course.trainerIds}">[]</td>
                <td th:text="${course.lecturerIds}">[]</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="alert alert-info text-center" th:if="${#lists.isEmpty(courses)}">
        No courses found.
    </div>
</div>
<footer th:replace="~{fragment::footer}"></footer>
</body>
</html>

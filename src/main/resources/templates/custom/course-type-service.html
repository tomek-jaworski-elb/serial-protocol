<!DOCTYPE html>
<html lang="en">
<head>
    <title th:text="${@environment.getProperty('spring.application.name')} + ' : Course Type'">Serial port server</title>
    <th:block th:replace="~{fragment::headContent}"></th:block>
</head>
<body>
<header th:replace="~{fragment::header}"></header>
<div class="container mb-4">
    <th:block th:replace="~{fragment::toastNotifications}"></th:block>

    <div class="d-flex justify-content-between align-items-center my-3">
        <h4 class="mb-0">Course Type</h4>
        <div class="d-flex align-items-center gap-2">
            <input id="tableFilterInput" type="text" class="form-control form-control-sm" placeholder="Filter..." style="width: 180px;">
            <span class="badge bg-secondary" th:text="${courseTypePage.totalElements}" th:if="${courseTypePage != null && courseTypePage.totalElements > 0}">0</span>
            <button id="printReportBtn" type="button" class="btn btn-outline-secondary btn-sm" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="bi bi-printer me-1" viewBox="0 0 16 16">
                    <path d="M2.5 8a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1"/>
                    <path d="M5 1a2 2 0 0 0-2 2v2H2a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h1v1a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1h1a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-1V3a2 2 0 0 0-2-2zm3 1h4a1 1 0 0 1 1 1v2H5V3a1 1 0 0 1 1-1zm-3 8v-1h8v2a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-1zm8-5a1 1 0 0 0-1 1H4a1 1 0 0 0-1-1z"/>
                </svg>
                Print Report
            </button>
            <button id="showAddFormBtn" type="button" class="btn btn-primary btn-sm">Add</button>
        </div>
    </div>

    <div id="addCourseTypeFormContainer" class="card mb-3 d-none">
        <div class="card-body">
            <h5 class="card-title">Add course type</h5>
            <form method="post" th:action="@{/course-type-service/add}">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label for="courseTypeCode" class="form-label">Code <span class="text-danger">*</span></label>
                        <input id="courseTypeCode" name="code" type="text" class="form-control" maxlength="32" required>
                    </div>
                    <div class="col-md-6">
                        <label for="courseTypeDescription" class="form-label">Description <span class="text-danger">*</span></label>
                        <input id="courseTypeDescription" name="description" type="text" class="form-control" maxlength="255" required>
                    </div>
                    <div class="col-12">
                        <label for="courseTypeLongDescription" class="form-label">Long Description</label>
                        <textarea id="courseTypeLongDescription" name="longDescription" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-success btn-sm">Save</button>
                    <button id="hideAddFormBtn" type="button" class="btn btn-outline-secondary btn-sm">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="updateCourseTypeFormContainer" class="card mb-3 d-none">
        <div class="card-body">
            <h5 class="card-title">Update course type</h5>
            <form method="post" th:action="@{/course-type-service/update}">
                <input id="updateCourseTypeId" name="id" type="hidden" required>
                <div class="row g-3">
                    <div class="col-md-3">
                        <label for="updateCourseTypeCode" class="form-label">Code <span class="text-danger">*</span></label>
                        <input id="updateCourseTypeCode" name="code" type="text" class="form-control" maxlength="32" required>
                    </div>
                    <div class="col-md-6">
                        <label for="updateCourseTypeDescription" class="form-label">Description <span class="text-danger">*</span></label>
                        <input id="updateCourseTypeDescription" name="description" type="text" class="form-control" maxlength="255" required>
                    </div>
                    <div class="col-12">
                        <label for="updateCourseTypeLongDescription" class="form-label">Long Description</label>
                        <textarea id="updateCourseTypeLongDescription" name="longDescription" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-warning btn-sm">Update</button>
                    <button id="hideUpdateFormBtn" type="button" class="btn btn-outline-secondary btn-sm">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive" th:if="${!#lists.isEmpty(courseTypes)}">
        <table class="table table-striped table-hover align-middle text-center filterable-table">
            <thead class="table-light">
            <tr>
                <th scope="col"><input type="checkbox" class="form-check-input" id="selectAllCheckbox" title="Select all"></th>
                <th scope="col">#</th>
                <th scope="col" data-sort="text">Code</th>
                <th scope="col" data-sort="text">Description</th>
                <th scope="col" data-sort="text">Long Description</th>
                <th scope="col">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="courseType, courseTypeStat : ${courseTypes}">
                <td><input type="checkbox" class="form-check-input row-select-checkbox" th:value="${courseType.id}"></td>
                <th scope="row" th:text="${courseTypeStat.index + 1}">1</th>
                <td th:text="${courseType.code}">A1</td>
                <td th:text="${courseType.description}">Description</td>
                <td class="text-start" th:text="${courseType.longDescription}">Long description</td>
                <td>
                    <div class="d-flex justify-content-center gap-2">
                        <button
                                type="button"
                                class="btn btn-outline-warning btn-sm update-course-type-btn"
                                th:attr="data-id=${courseType.id},data-code=${courseType.code},data-description=${courseType.description},data-long-description=${courseType.longDescription}">
                            Update
                        </button>
                        <form method="post" th:action="@{/course-type-service/delete/{id}(id=${courseType.id})}">
                            <button type="submit" class="btn btn-outline-danger btn-sm"
                                    onclick="return confirm('Are you sure you want to delete this item?');">
                                Delete
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragment :: pagination(${courseTypePage}, '/course-type-service', ${pageSize})}"></div>

    <div class="alert alert-info text-center" th:if="${#lists.isEmpty(courseTypes)}">
        No course types found.
    </div>
</div>
<form id="pdfReportForm" method="post" th:action="@{/pdf/course-type}" target="_blank" style="display:none;">
    <input type="hidden" id="pdfReportIds" name="ids" value="">
</form>
<footer th:replace="~{fragment::footer}"></footer>
<script th:src="@{/js/common/table-filter-sort.js}"></script>
<script>
    const showAddFormBtn = document.getElementById('showAddFormBtn');
    const hideAddFormBtn = document.getElementById('hideAddFormBtn');
    const addCourseTypeFormContainer = document.getElementById('addCourseTypeFormContainer');
    const updateCourseTypeFormContainer = document.getElementById('updateCourseTypeFormContainer');
    const hideUpdateFormBtn = document.getElementById('hideUpdateFormBtn');
    const updateButtons = document.querySelectorAll('.update-course-type-btn');
    const updateCourseTypeId = document.getElementById('updateCourseTypeId');
    const updateCourseTypeCode = document.getElementById('updateCourseTypeCode');
    const updateCourseTypeDescription = document.getElementById('updateCourseTypeDescription');
    const updateCourseTypeLongDescription = document.getElementById('updateCourseTypeLongDescription');

    if (showAddFormBtn && hideAddFormBtn && addCourseTypeFormContainer) {
        showAddFormBtn.addEventListener('click', () => {
            addCourseTypeFormContainer.classList.remove('d-none');
            if (updateCourseTypeFormContainer) {
                updateCourseTypeFormContainer.classList.add('d-none');
            }
            addCourseTypeFormContainer.scrollIntoView({behavior: 'smooth', block: 'start'});
        });

        hideAddFormBtn.addEventListener('click', () => {
            addCourseTypeFormContainer.classList.add('d-none');
        });
    }

    if (hideUpdateFormBtn && updateCourseTypeFormContainer) {
        hideUpdateFormBtn.addEventListener('click', () => {
            updateCourseTypeFormContainer.classList.add('d-none');
        });
    }

    if (updateButtons.length > 0 && updateCourseTypeFormContainer) {
        updateButtons.forEach((btn) => {
            btn.addEventListener('click', () => {
                updateCourseTypeId.value = btn.dataset.id || '';
                updateCourseTypeCode.value = btn.dataset.code || '';
                updateCourseTypeDescription.value = btn.dataset.description || '';
                updateCourseTypeLongDescription.value = btn.dataset.longDescription || '';
                updateCourseTypeFormContainer.classList.remove('d-none');
                if (addCourseTypeFormContainer) {
                    addCourseTypeFormContainer.classList.add('d-none');
                }
                updateCourseTypeFormContainer.scrollIntoView({behavior: 'smooth', block: 'start'});
            });
        });
    }

    // ── PDF Report ──────────────────────────────────────────────────────────
    const selectAllCheckbox = document.getElementById('selectAllCheckbox');
    const rowCheckboxes = document.querySelectorAll('.row-select-checkbox');
    const printReportBtn = document.getElementById('printReportBtn');
    const pdfReportForm = document.getElementById('pdfReportForm');
    const pdfReportIds = document.getElementById('pdfReportIds');

    function updatePrintButton() {
        const checkedBoxes = document.querySelectorAll('.row-select-checkbox:checked');
        const total = rowCheckboxes.length;
        const checked = checkedBoxes.length;
        if (printReportBtn) {
            printReportBtn.disabled = checked === 0;
        }
        if (selectAllCheckbox) {
            selectAllCheckbox.checked = checked === total && total > 0;
            selectAllCheckbox.indeterminate = checked > 0 && checked < total;
        }
    }

    if (selectAllCheckbox) {
        selectAllCheckbox.addEventListener('change', () => {
            rowCheckboxes.forEach(cb => { cb.checked = selectAllCheckbox.checked; });
            updatePrintButton();
        });
    }

    rowCheckboxes.forEach(cb => {
        cb.addEventListener('change', updatePrintButton);
    });

    if (printReportBtn && pdfReportForm && pdfReportIds) {
        printReportBtn.addEventListener('click', () => {
            const checkedIds = Array.from(document.querySelectorAll('.row-select-checkbox:checked'))
                .map(cb => cb.value)
                .join(',');
            pdfReportIds.value = checkedIds;
            pdfReportForm.submit();
        });
    }
</script>
</body>
</html>

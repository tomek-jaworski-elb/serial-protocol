<!DOCTYPE html>
<html lang="en">
<head>
    <title th:text="${@environment.getProperty('spring.application.name')} + ' : Instructors'">Serial port
        server</title>
    <th:block th:replace="~{fragment::headContent}"></th:block>
    <style>
        .photo-wrapper {
            width: 50px;
            height: 50px;
            display: inline-block;
            position: relative;
            background-color: #e9ecef;
            border-radius: 4px;
        }
        .photo-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<header th:replace="~{fragment::header}"></header>
<div class="container mb-4">
    <!-- Pagination info -->
    <div class="d-flex justify-content-between align-items-center mb-3" th:if="${!#lists.isEmpty(instructors)}">
        <div>
            <span class="text-muted">
                Showing <span th:text="${currentPage * pageSize + 1}">1</span> -
                <span th:text="${currentPage * pageSize + #lists.size(instructors)}">20</span>
                of <span th:text="${totalElements}">100</span> instructors
            </span>
        </div>
        <div>
            <label for="pageSizeSelect" class="me-2">Page size:</label>
            <select id="pageSizeSelect" class="form-select form-select-sm d-inline-block" style="width: auto;" onchange="changePageSize(this.value)">
                <option th:selected="${pageSize == 10}" value="10">10</option>
                <option th:selected="${pageSize == 20}" value="20">20</option>
                <option th:selected="${pageSize == 50}" value="50">50</option>
                <option th:selected="${pageSize == 100}" value="100">100</option>
            </select>
        </div>
    </div>

    <!-- Pagination controls -->
    <nav th:if="${totalPages > 1}" aria-label="Instructors pagination" class="mb-3">
        <ul class="pagination justify-content-center">
            <!-- First page -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/instructor-service(page=0, size=${pageSize})}" aria-label="First">
                    <span aria-hidden="true">&laquo;&laquo;</span>
                </a>
            </li>
            <!-- Previous page -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/instructor-service(page=${currentPage - 1}, size=${pageSize})}" aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                </a>
            </li>

            <!-- Page numbers -->
            <th:block th:with="startPage=${T(java.lang.Math).max(0, currentPage - 2)}, endPage=${T(java.lang.Math).min(totalPages - 1, currentPage + 2)}">
                <li class="page-item" th:each="pageNum : ${#numbers.sequence(startPage, endPage)}"
                    th:classappend="${pageNum == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/instructor-service(page=${pageNum}, size=${pageSize})}"
                       th:text="${pageNum + 1}">1</a>
                </li>
            </th:block>

            <!-- Next page -->
            <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/instructor-service(page=${currentPage + 1}, size=${pageSize})}" aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                </a>
            </li>
            <!-- Last page -->
            <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/instructor-service(page=${totalPages - 1}, size=${pageSize})}" aria-label="Last">
                    <span aria-hidden="true">&raquo;&raquo;</span>
                </a>
            </li>
        </ul>
    </nav>

    <table th:if="${!#lists.isEmpty(instructors)}" class="table table-striped align-middle text-center">
        <thead>
        <tr>
            <th scope="col" style="width: 50px;">#</th>
            <th scope="col" style="width: 60px;">ID</th>
            <th scope="col">Name</th>
            <th scope="col">Surname</th>
            <th scope="col" style="width: 100px;">Nick</th>
            <th scope="col" style="width: 70px;">Photo 1</th>
            <th scope="col" style="width: 70px;">Photo 2</th>
            <th scope="col" style="width: 70px;">Photo 3</th>
            <th scope="col" style="width: 70px;">Photo 4</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="instructor, instructorStat : ${instructors}">
            <th scope="row" th:text="${currentPage * pageSize + instructorStat.index + 1}">Index</th>
            <td th:text="${instructor.no}">ID</td>
            <td th:text="${instructor.name}">Name</td>
            <td th:text="${instructor.surname}">Surname</td>
            <td th:text="${instructor.nick}">Nick</td>
            <td>
                <div class="photo-wrapper">
                    <img th:if="${instructor.photo1 != null and !instructor.photo1.isEmpty()}"
                         th:src="@{'data:image/jpeg;base64,'+${instructor.photo1}}"
                         alt="Photo 1"
                         class="img-thumbnail photo-popover"
                         data-bs-toggle="popover"
                         data-bs-trigger="hover focus"
                         data-bs-html="true"
                         th:data-bs-content="|&lt;img src='data:image/jpeg;base64,${instructor.photo1}' alt='Photo' style='max-width: 250px; max-height: 250px; border-radius: 8px;'/&gt;|">
                </div>
            </td>
            <td>
                <div class="photo-wrapper">
                    <img th:if="${instructor.photo2 != null and !instructor.photo2.isEmpty()}"
                         th:src="@{'data:image/jpeg;base64,'+${instructor.photo2}}"
                         alt="Photo 2"
                         class="img-thumbnail photo-popover"
                         data-bs-toggle="popover"
                         data-bs-trigger="hover focus"
                         data-bs-html="true"
                         th:data-bs-content="|&lt;img src='data:image/jpeg;base64,${instructor.photo2}' alt='Photo' style='max-width: 250px; max-height: 250px; border-radius: 8px;'/&gt;|">
                </div>
            </td>
            <td>
                <div class="photo-wrapper">
                    <img th:if="${instructor.photo3 != null and !instructor.photo3.isEmpty()}"
                         th:src="@{'data:image/jpeg;base64,'+${instructor.photo3}}"
                         alt="Photo 3"
                         class="img-thumbnail photo-popover"
                         data-bs-toggle="popover"
                         data-bs-trigger="hover focus"
                         data-bs-html="true"
                         th:data-bs-content="|&lt;img src='data:image/jpeg;base64,${instructor.photo3}' alt='Photo' style='max-width: 250px; max-height: 250px; border-radius: 8px;'/&gt;|">
                </div>
            </td>
            <td>
                <div class="photo-wrapper">
                    <img th:if="${instructor.photo4 != null and !instructor.photo4.isEmpty()}"
                         th:src="@{'data:image/jpeg;base64,'+${instructor.photo4}}"
                         alt="Photo 4"
                         class="img-thumbnail photo-popover"
                         data-bs-toggle="popover"
                         data-bs-trigger="hover focus"
                         data-bs-html="true"
                         th:data-bs-content="|&lt;img src='data:image/jpeg;base64,${instructor.photo4}' alt='Photo' style='max-width: 250px; max-height: 250px; border-radius: 8px;'/&gt;|">
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination controls (bottom) -->
    <nav th:if="${totalPages > 1}" aria-label="Instructors pagination bottom" class="mt-3">
        <ul class="pagination justify-content-center">
            <!-- First page -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/instructor-service(page=0, size=${pageSize})}" aria-label="First">
                    <span aria-hidden="true">&laquo;&laquo;</span>
                </a>
            </li>
            <!-- Previous page -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/instructor-service(page=${currentPage - 1}, size=${pageSize})}" aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span>
                </a>
            </li>

            <!-- Page numbers -->
            <th:block th:with="startPage=${T(java.lang.Math).max(0, currentPage - 2)}, endPage=${T(java.lang.Math).min(totalPages - 1, currentPage + 2)}">
                <li class="page-item" th:each="pageNum : ${#numbers.sequence(startPage, endPage)}"
                    th:classappend="${pageNum == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/instructor-service(page=${pageNum}, size=${pageSize})}"
                       th:text="${pageNum + 1}">1</a>
                </li>
            </th:block>

            <!-- Next page -->
            <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/instructor-service(page=${currentPage + 1}, size=${pageSize})}" aria-label="Next">
                    <span aria-hidden="true">&raquo;</span>
                </a>
            </li>
            <!-- Last page -->
            <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/instructor-service(page=${totalPages - 1}, size=${pageSize})}" aria-label="Last">
                    <span aria-hidden="true">&raquo;&raquo;</span>
                </a>
            </li>
        </ul>
    </nav>


    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(instructors)}" class="alert alert-info text-center">
        No instructors found.
    </div>
</div>
<footer th:replace="~{fragment::footer}"></footer>
<script th:inline="javascript">
    // Initialize Bootstrap popovers for photos
    document.addEventListener('DOMContentLoaded', function () {
        var popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'));
        popoverTriggerList.forEach(function (popoverTriggerEl) {
            new bootstrap.Popover(popoverTriggerEl, {
                container: 'body',
                placement: 'auto',
                html: true,
                sanitize: false
            });
        });
    });

    function changePageSize(size) {
        window.location.href = '/instructor-service?page=0&size=' + size;
    }
</script>
</body>
</html>
